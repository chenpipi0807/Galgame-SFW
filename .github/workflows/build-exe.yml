name: Build GalGame (Windows + macOS)

# 触发：手动运行，或推送 v* tag 时自动构建并发布 Release
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # 发布 Release 需要

jobs:
  # ── Windows：产出 GalGame.exe ───────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build exe (PyInstaller)
        run: pyinstaller galgame.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GalGame-windows
          path: dist/GalGame.exe
          if-no-files-found: error

      - name: Publish to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GalGame.exe

  # ── macOS：同时产出 Apple Silicon 与 Intel 两个版本 ────────────────────────
  build-macos:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # Apple Silicon (arm64)
            label: AppleSilicon
          - runner: macos-13   # Intel (x86_64)
            label: Intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build app (PyInstaller)
        run: pyinstaller galgame-mac.spec --noconfirm

      # 打成 zip：附「一键启动」脚本 + 打开说明，帮用户绕过 Gatekeeper（未签名应用的正常拦截）
      - name: Package macOS binary
        run: |
          cd dist
          chmod +x GalGame
          # 一键启动脚本：双击（右键→打开）即解除隔离并启动
          cat > 启动GalGame.command <<'SH'
          #!/bin/bash
          cd "$(dirname "$0")"
          xattr -cr ./GalGame ./启动GalGame.command 2>/dev/null
          chmod +x ./GalGame
          ./GalGame
          SH
          chmod +x 启动GalGame.command
          # 打开说明
          cat > 如何打开-Mac必读.txt <<'TXT'
          GalGame · macOS 打开说明
          =========================

          请按你的芯片下载对应版本：Apple Silicon（M1/M2/M3…）下 AppleSilicon 版，
          Intel 芯片下 Intel 版。下错会报 "bad CPU type in executable"。
          （左上角  → 关于本机 → 看「芯片/处理器」）

          首次打开时 macOS 可能提示"来自身份不明的开发者"。这是系统对未签名应用的
          正常安全提示，不是病毒，按下面任一方式即可打开：

          【方式一 · 最简单】
          右键点击「启动GalGame.command」→ 选「打开」→ 弹窗里再点一次「打开」。
          之后会自动启动 GalGame 并打开浏览器。（以后双击它即可）

          【方式二 · 手动命令行】
          打开「终端」(Terminal)，cd 到本文件夹后，依次执行：
            xattr -cr ./GalGame
            chmod +x ./GalGame
            ./GalGame

          运行后会出现一个终端窗口（正常现象），并自动打开浏览器进入游戏。
          所有数据保存在可执行文件同级目录，完全本地运行、不上传。
          TXT
          zip -y GalGame-macOS-${{ matrix.label }}.zip GalGame 启动GalGame.command 如何打开-Mac必读.txt
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GalGame-macOS-${{ matrix.label }}
          path: dist/GalGame-macOS-${{ matrix.label }}.zip
          if-no-files-found: error

      - name: Publish to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GalGame-macOS-${{ matrix.label }}.zip
